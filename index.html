<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#05060A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="icon" type="image/png" href="k31-logo.png" />
<link rel="apple-touch-icon" href="k31-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<title>K31 Mobile Tire & Roadside</title>
<style>
  :root {
    --primary: #1BA5FF;
    --primary-deep: #0066D6;
    --primary-glow: #4FC3FF;
    --accent: #FF7A1F;
    --accent-glow: #FFB347;
    --accent-deep: #E85A10;
    --chrome-hi: #F4F4F7;
    --chrome-mid: #C7C7CF;
    --chrome-lo: #6E6E78;
    --bg: #05060A;
    --surface: #11131B;
    --surface2: #1A1D27;
    --border: #242836;
    --text: #F5F7FA;
    --dim: #9AA0B0;
    --mute: #656B7A;
    --success: #22C55E;
    --warn: #EAB308;
    --danger: #EF4444;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }
  html, body { height: 100%; }
  #app {
    min-height: 100vh;              /* fallback */
    min-height: 100dvh;             /* dynamic viewport — correct on iOS */
    background:
      radial-gradient(ellipse at 50% 0%, rgba(27,165,255,.08), transparent 60%),
      radial-gradient(ellipse at 100% 100%, rgba(255,122,31,.06), transparent 60%),
      linear-gradient(180deg, #05060A 0%, #0A0D15 100%);
    display: flex; flex-direction: column;
    max-width: 520px; margin: 0 auto; position: relative;
  }
  /* The <main> wrapper that holds page content */
  #app > main {
    flex: 1;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  /* Every full page reserves bottom space for the floating nav + FAB + home indicator */
  .page {
    padding: max(20px, env(safe-area-inset-top)) 16px calc(130px + env(safe-area-inset-bottom, 0px));
    animation: fadeIn .22s ease;
    flex: 1;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes streak { 0% { opacity: .4; transform: translateX(-3%); } 100% { opacity: 1; transform: translateX(3%); } }

  /* LOADING */
  .loading-screen {
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    background: radial-gradient(circle at 50% 50%, rgba(27,165,255,.12), transparent 50%), linear-gradient(180deg, #05060A, #0A0D18);
  }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--primary);
    animation: spin 0.8s linear infinite;
  }
  .loading-label { color: var(--dim); font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }

  /* LOGO */
  .logo-full {
    display: block;
    filter: drop-shadow(0 4px 22px rgba(27,165,255,.35)) drop-shadow(0 2px 8px rgba(255,122,31,.2));
    max-width: 100%; height: auto;
  }
  .logo-compact {
    background: linear-gradient(135deg, rgba(27,165,255,.12), rgba(255,122,31,.08));
    border: 1px solid var(--border); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden; padding: 4px;
    width: 48px; height: 48px;
  }
  .logo-compact img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); }

  /* HEADER */
  header.page-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; gap: 10px; }
  .head-brand { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .head-brand > div:last-child { min-width: 0; flex: 1; }
  .greet { font-size: 11px; color: var(--dim); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
  .biz {
    font-size: 16px; font-weight: 800; margin: 2px 0 0; letter-spacing: -.01em;
    background: linear-gradient(180deg, var(--chrome-hi), var(--chrome-mid) 50%, var(--chrome-lo));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
    line-height: 1.2;
  }

  /* Smaller screens — tighten spacing (keep safe-area envelopes intact) */
  @media (max-width: 400px) {
    .page {
      padding: max(16px, env(safe-area-inset-top)) 12px calc(130px + env(safe-area-inset-bottom, 0px));
    }
    .card { padding: 14px; border-radius: 16px; }
    .biz { font-size: 14px; }
    .greet { font-size: 10px; }
    .logo-compact { width: 40px !important; height: 40px !important; }
    .quote-btn { padding: 12px 14px; }
    .quote-btn-title { font-size: 15px; }
    .quote-btn-sub { font-size: 10px; }
    .quote-btn-ico { width: 36px; height: 36px; font-size: 18px; }
    .week-amount { font-size: 28px !important; }
    .stats { gap: 8px; }
    .stat { padding: 10px 8px; }
    .stat-val { font-size: 16px; }
    .quick-grid { gap: 8px; }
    .quick-tile { padding: 14px 10px; font-size: 12px; }
    .job-icon { width: 38px; height: 38px; font-size: 18px; }
    .job-svc { font-size: 13px; }
    .job-price { font-size: 14px; }
    .nav-btn { font-size: 8px; }
    .nav-btn .ico { font-size: 18px; }
    .fab { width: 50px; height: 50px; font-size: 22px; }
    .form-head {
      padding: max(10px, env(safe-area-inset-top)) 12px 10px;
    }
    .form-title { font-size: 16px; }
    .form-body {
      padding: 12px 12px calc(40px + env(safe-area-inset-bottom, 0px));
    }
  }

  /* Tiny phones (iPhone SE) */
  @media (max-width: 360px) {
    .vtype-grid { grid-template-columns: 1fr; }
    .service-picker { flex-direction: column; }
    .svc-chip { width: 100%; justify-content: flex-start; }
  }

  /* BUTTONS */
  .btn-primary {
    background: linear-gradient(135deg, var(--primary-glow), var(--primary) 40%, var(--primary-deep));
    color: white; border: 0; padding: 14px 22px; border-radius: 14px;
    font-size: 15px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; width: auto;
    box-shadow: 0 6px 20px rgba(27,165,255,.35), inset 0 1px 0 rgba(255,255,255,.2);
    transition: transform .1s; min-height: 48px; letter-spacing: .01em;
  }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
  .btn-primary.full { width: 100%; }

  .btn-ghost {
    background: rgba(255,255,255,.02); color: var(--text); border: 1px solid var(--border);
    padding: 14px 22px; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px; min-height: 48px;
  }
  .btn-ghost.danger { color: var(--danger); border-color: rgba(239,68,68,.4); background: rgba(239,68,68,.04); }
  .btn-ghost:active { transform: scale(.98); }

  .btn-google {
    background: white; color: #1a1a1a; border: 0;
    padding: 13px 20px; border-radius: 14px; font-size: 15px; font-weight: 600; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; min-height: 48px; box-shadow: 0 2px 10px rgba(0,0,0,.3);
  }

  .icon-btn {
    background: var(--surface2); border: 1px solid var(--border);
    width: 40px; height: 40px; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text); cursor: pointer; flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(.95); }

  .fab-mini {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-glow), var(--accent) 50%, var(--accent-deep));
    border: 0; color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(255,122,31,.45), inset 0 1px 0 rgba(255,255,255,.25); flex-shrink: 0;
  }

  /* INPUTS */
  label.field-label {
    display: block; font-size: 11px; font-weight: 700; color: var(--dim); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: .08em;
  }
  input[type=text], input[type=email], input[type=password], input[type=number], input[type=tel], textarea, select {
    width: 100%; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; font-size: 15px; outline: none;
    transition: border-color .15s, box-shadow .15s; font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(27,165,255,.18); }
  input:disabled { opacity: .6; }
  textarea { resize: vertical; min-height: 72px; }

  .hint { font-size: 12px; color: var(--mute); margin: 8px 0 0; }
  .err-msg { background: rgba(239,68,68,.12); color: var(--danger); border: 1px solid rgba(239,68,68,.3); padding: 10px 12px; border-radius: 10px; font-size: 13px; }
  .ok-msg { background: rgba(34,197,94,.12); color: var(--success); border: 1px solid rgba(34,197,94,.3); padding: 10px 12px; border-radius: 10px; font-size: 13px; }

  .field { margin-bottom: 16px; }
  .field-inline { margin-top: 12px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }

  .card {
    background: linear-gradient(180deg, var(--surface), #0F1119);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 18px; margin-bottom: 14px;
  }

  /* QUICK QUOTE BUTTON */
  .quote-btn {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; padding: 14px 18px; margin-bottom: 14px;
    background: linear-gradient(135deg, var(--accent-glow) 0%, var(--accent) 50%, var(--accent-deep) 100%);
    border: 0; border-radius: 16px; color: white; cursor: pointer;
    font-family: inherit; text-align: left;
    box-shadow: 0 6px 22px rgba(255,122,31,.4), inset 0 1px 0 rgba(255,255,255,.25);
    transition: transform .12s;
  }
  .quote-btn:active { transform: scale(.98); }
  .quote-btn-left { display: flex; align-items: center; gap: 12px; }
  .quote-btn-ico {
    width: 40px; height: 40px; border-radius: 12px;
    background: rgba(255,255,255,.22); display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
  }
  .quote-btn-title { font-size: 16px; font-weight: 800; letter-spacing: -.01em; }
  .quote-btn-sub { font-size: 11px; opacity: .9; margin-top: 2px; font-weight: 500; }
  .quote-btn-arrow { font-size: 22px; font-weight: 600; opacity: .8; }

  /* QUOTE RESULT */
  .quote-result {
    background: linear-gradient(135deg, rgba(27,165,255,.18), rgba(255,122,31,.08));
    border: 1px solid var(--primary); border-radius: 14px;
    padding: 18px; text-align: center; margin-top: 14px;
  }
  .quote-result-label { font-size: 11px; text-transform: uppercase; color: var(--primary-glow); font-weight: 700; letter-spacing: .12em; }
  .quote-result-amount {
    font-size: 40px; font-weight: 800; letter-spacing: -.02em; color: white; margin: 6px 0 4px;
  }
  .quote-result-breakdown { font-size: 12px; color: var(--dim); }

  /* SYNC INDICATOR */
  .sync-dot {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--success); font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em; margin-top: 4px;
  }
  .sync-dot-ico {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 6px rgba(34,197,94,.6);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .sec-title { font-size: 11px; font-weight: 800; color: var(--dim); text-transform: uppercase; letter-spacing: .12em; margin: 0 0 12px; }
  .sec-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .link-btn { background: transparent; border: 0; color: var(--primary); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
  .dim { color: var(--dim); }
  .mute { color: var(--mute); }

  /* AUTH */
  #auth-view {
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .auth-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(circle at 15% 20%, rgba(27,165,255,.35), transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(255,122,31,.25), transparent 50%),
      linear-gradient(180deg, #05060A 0%, #0A0D18 50%, #050709 100%);
  }
  .auth-speed {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      linear-gradient(105deg, transparent 30%, rgba(27,165,255,.08) 45%, transparent 55%),
      linear-gradient(285deg, transparent 30%, rgba(255,122,31,.06) 45%, transparent 55%);
    animation: streak 8s ease-in-out infinite alternate;
  }
  .auth-card {
    position: relative; z-index: 1; width: 100%; max-width: 400px;
    background: rgba(10,13,20,.82); border: 1px solid rgba(27,165,255,.15);
    backdrop-filter: blur(24px); border-radius: 28px; padding: 28px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .auth-logo-wrap { display: flex; justify-content: center; margin-bottom: 4px; }
  .auth-tagline { text-align: center; font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 22px; }
  .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 18px; border: 1px solid var(--border); }
  .auth-tab { background: transparent; color: var(--dim); border: 0; padding: 10px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .auth-form { display: flex; flex-direction: column; gap: 10px; }
  .auth-form .btn-primary { margin-top: 6px; width: 100%; }
  .auth-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: var(--mute); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; }
  .auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .auth-foot { text-align: center; color: var(--mute); font-size: 11px; margin-top: 16px; letter-spacing: .05em; }
  .auth-forgot {
    background: transparent; border: 0; color: var(--dim);
    font-size: 13px; font-weight: 500; padding: 8px 4px; margin-top: 2px;
    cursor: pointer; font-family: inherit; text-align: center;
  }
  .auth-forgot:hover, .auth-forgot:active { color: var(--primary); }
  .auth-forgot:disabled { opacity: .5; }

  /* DASHBOARD */
  .week-card {
    background: radial-gradient(circle at 0% 0%, rgba(27,165,255,.15), transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(255,122,31,.08), transparent 50%),
      linear-gradient(180deg, #141724, #0E1018);
    border-color: rgba(27,165,255,.2); position: relative; overflow: hidden;
  }
  .week-card::before { content: ""; position: absolute; top: -60px; right: -60px; width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(27,165,255,.25), transparent 70%); pointer-events: none; }
  .week-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; position: relative; }
  .week-label { font-size: 11px; font-weight: 700; color: var(--primary-glow); text-transform: uppercase; letter-spacing: .12em; }
  .week-amount {
    font-size: 34px; font-weight: 800; margin-top: 6px; letter-spacing: -.02em;
    background: linear-gradient(180deg, var(--chrome-hi), var(--chrome-mid));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .week-sub { font-size: 13px; color: var(--dim); margin-top: 2px; }
  .week-profit { margin-top: 14px; display: flex; gap: 10px; align-items: center; font-size: 13px; color: var(--success); }
  .week-profit b { font-size: 18px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 10px; display: flex; flex-direction: column; gap: 4px;
  }
  .stat-ico { font-size: 18px; line-height: 1; }
  .stat-val { font-size: 18px; font-weight: 800; letter-spacing: -.01em; margin-top: 2px; }
  .stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; font-weight: 700; letter-spacing: .08em; }

  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quick-tile {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 14px; padding: 14px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 700; text-align: left; transition: all .15s;
  }
  .quick-tile:active { transform: scale(.97); background: var(--surface2); border-color: var(--primary); }
  .quick-tile .ico { font-size: 20px; }

  /* JOB ROW */
  .job-list { display: flex; flex-direction: column; gap: 8px; }
  .job-row {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px; cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 12px; transition: border-color .15s;
    font-family: inherit; color: var(--text);
  }
  .job-row:active { transform: scale(.99); }
  .job-icon { width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(27,165,255,.15), rgba(27,165,255,.05));
    color: var(--primary); display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(27,165,255,.2); font-size: 20px;
  }
  .job-main { flex: 1; min-width: 0; }
  .job-title-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .job-svc { font-size: 14px; font-weight: 700; }
  .tag-hd { font-size: 10px; font-weight: 800; letter-spacing: .05em;
    background: linear-gradient(135deg, rgba(255,122,31,.2), rgba(255,122,31,.08));
    color: var(--accent-glow); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,122,31,.3);
  }
  .job-meta { font-size: 11px; color: var(--dim); margin-top: 2px; display: flex; align-items: center; gap: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job-right { text-align: right; flex-shrink: 0; }
  .job-price { font-size: 15px; font-weight: 800; }
  .job-status { font-size: 10px; font-weight: 700; margin-top: 3px; display: inline-flex; align-items: center; gap: 3px; letter-spacing: .03em; }
  .job-status.pending { color: var(--warn); }
  .job-status.progress { color: var(--primary); }
  .job-status.completed { color: var(--success); }

  /* FORM PAGE */
  .form-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: max(12px, env(safe-area-inset-top)) 16px 12px;
    position: sticky; top: 0;
    background: rgba(5,6,10,.92); backdrop-filter: blur(14px);
    z-index: 10; border-bottom: 1px solid var(--border);
  }
  .form-title { font-size: 17px; font-weight: 800; margin: 0; letter-spacing: -.01em; }
  /* Form body needs enough bottom padding to clear the floating save button area + any home indicator.
     Form pages don't show the bottom nav, but we still want the last button comfortably above the home indicator. */
  .form-body { padding: 16px 16px calc(40px + env(safe-area-inset-bottom, 0px)); }
  .form-actions { display: flex; gap: 10px; margin-top: 16px; }
  .form-actions .btn-primary { flex: 1; }
  .form-actions .btn-ghost { flex: 1; }

  /* SERVICE PICKER */
  .service-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .svc-chip {
    background: var(--surface2); color: var(--text);
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 13px; font-weight: 600;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  .svc-chip.on { border-color: var(--primary); background: linear-gradient(135deg, rgba(27,165,255,.15), rgba(27,165,255,.05)); color: var(--primary-glow); }

  /* VEHICLE TYPE */
  .vtype-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .vtype-btn {
    background: var(--surface2); border: 1.5px solid var(--border);

  if (c === "auth/network-request-failed") return "Network error. Check your connection.";
  if (c === "auth/too-many-requests") return "Too many attempts. Try again later.";
  if (c === "auth/unauthorized-domain") return "Domain not authorized in Firebase.";
  if (c === "auth/api-key-not-valid" || c === "auth/invalid-api-key") return "Invalid API key — check Firebase config.";
  return e?.message || "Something went wrong.";
}

/* ============================================================
   FIREBASE DATA LAYER
   ============================================================ */

function detachAll() {
  state.unsubs.forEach(u => { try { u(); } catch {} });
  state.unsubs = [];
}

async function ensureUserDoc(uid, email) {
  const userRef = doc(db, "users", uid);
  // Create base user doc (idempotent — merge)
  await setDoc(userRef, {
    email: email || null,
    createdAt: serverTimestamp(),
  }, { merge: true });
  // Create default settings doc if missing
  const settingsRef = doc(db, "users", uid, "settings", "config");
  await setDoc(settingsRef, DEFAULT_SETTINGS, { merge: true });
}

function attachUserSubs(uid) {
  detachAll();

  // Settings
  const settingsRef = doc(db, "users", uid, "settings", "config");
  state.unsubs.push(onSnapshot(settingsRef, (snap) => {
    const data = snap.exists() ? snap.data() : {};
    // Merge defaults in case fields missing (like new services added later)
    state.settings = {
      ...DEFAULT_SETTINGS,
      ...data,
      servicesConfig: {
        ...DEFAULT_SETTINGS.servicesConfig,
        ...(data.servicesConfig || {}),
      },
    };
    render();
  }, (e) => console.error("settings:", e)));

  // Jobs
  const jobsRef = collection(db, "users", uid, "jobs");
  const jq = query(jobsRef, orderBy("createdAt", "desc"));
  state.unsubs.push(onSnapshot(jq, (snap) => {
    state.jobs = snap.docs.map(d => {
      const data = d.data();
      return { id: d.id, ...data, createdAt: tsToMs(data.createdAt) };
    });
    // Infer saved locations from jobs
    const loc = {};
    state.jobs.forEach(j => {
      if (!j.location) return;
      const k = j.location.toLowerCase();
      if (!loc[k]) loc[k] = { name: j.location, count: 0, lastUsed: 0 };
      loc[k].count++;
      loc[k].lastUsed = Math.max(loc[k].lastUsed, j.createdAt);
    });
    state.savedLocations = Object.values(loc);
    render();
  }, (e) => console.error("jobs:", e)));

  // Inventory
  const invRef = collection(db, "users", uid, "inventory");
  state.unsubs.push(onSnapshot(invRef, (snap) => {
    state.inventory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, (e) => console.error("inventory:", e)));

  // Expenses
  const expRef = collection(db, "users", uid, "expenses");
  const eq = query(expRef, orderBy("date", "desc"));
  state.unsubs.push(onSnapshot(eq, (snap) => {
    state.expenses = snap.docs.map(d => {
      const data = d.data();
      return { id: d.id, ...data, date: tsToMs(data.date) };
    });
    render();
  }, (e) => console.error("expenses:", e)));
}

/* ============================================================
   PRICING ENGINE
   ============================================================ */

function calcPricing(inputs) {
  const {
    serviceId, vehicleType = "car",
    miles = 0, materialCost = 0, customAdjustment = 0,
  } = inputs;

  const svc = SERVICES.find(s => s.id === serviceId);
  const svcCfg = state.settings?.servicesConfig?.[serviceId] || {};
  const basePriceRaw = Number(svcCfg.base ?? svc?.base ?? 0);
  const minProfit = Number(svcCfg.minProfit ?? svc?.minProfit ?? 0);

  const vType = VEHICLE_TYPES.find(v => v.id === vehicleType) || VEHICLE_TYPES[0];
  const mult = vType.multiplier || 1;
  const basePrice = Math.round(basePriceRaw * mult * 100) / 100;

  const perMileRate = Number(state.settings?.perMileRate ?? 1.5);
  const freeMiles = Number(state.settings?.freeMiles ?? 10);
  const billableMiles = Math.max(0, Number(miles) - freeMiles);
  const travelCharge = Math.round(billableMiles * perMileRate * 100) / 100;

  const adj = Number(customAdjustment) || 0;
  const mat = Number(materialCost) || 0;

  const rawPrice = Math.round((basePrice + travelCharge + adj) * 100) / 100;
  const minimumAllowed = Math.round((mat + minProfit) * 100) / 100;
  const suggestedPrice = Math.max(rawPrice, minimumAllowed);

  return {
    basePrice, travelCharge, billableMiles, perMileRate, adj, mat,
    rawPrice, minimumAllowed, suggestedPrice, minProfit, mult,
    bumpedToMin: suggestedPrice > rawPrice,
  };
}

    try { await ensureUserDoc(user.uid, user.email); } catch (e) { console.error(e); }
    attachUserSubs(user.uid);
    state.view = "dashboard";
  } else {

    state.jobs = [];
    state.inventory = [];
    state.expenses = [];
  }
  render();
});

   ============================================================ */

function render() {
  const root = document.getElementById("root");
  if (state.authChecking) {
    root.innerHTML = renderLoading("Loading...");
    return;
  }
  if (!state.user) {
    root.innerHTML = renderAuth();
    bindAuth();
    return;
  }
  if (!state.settings) {
    root.innerHTML = renderLoading("Syncing your data...");
    return;
  }

  // Main app
  let body = "";
  if (state.view === "dashboard")   body = renderDashboard();
  else if (state.view === "jobs")        body = renderJobsList();
  else if (state.view === "inventory")   body = renderInventoryList();
  else if (state.view === "expenses")    body = renderExpensesList();
  else if (state.view === "settings")    body = renderSettings();
  else if (state.view === "job-form")    body = renderJobForm();
  else if (state.view === "job-detail")  body = renderJobDetail();
  else if (state.view === "inv-form")    body = renderInventoryForm();
  else if (state.view === "exp-form")    body = renderExpenseForm();
  else body = renderDashboard();

  const needsNav = ["dashboard","jobs","inventory","expenses","settings"].includes(state.view);

  root.innerHTML = `
    <div id="app">
      <main>${body}</main>
      ${needsNav ? renderBottomNav() : ""}
      <div id="modal-container"></div>
    </div>
  `;
  bindCurrentView();
}

let _authMode = "login";

function bindAuth() {
  _authMode = "login";
  const tabs = $$(".auth-tab");
  const submit = $("#auth-submit");
  const form = $("#auth-form");
  const err = $("#auth-err");
  const pwd = $("#auth-password");

  tabs.forEach(t => {
    t.onclick = () => {
      _authMode = t.dataset.mode;
      tabs.forEach(x => x.classList.toggle("active", x === t));
      submit.textContent = _authMode === "login" ? "Sign In" : "Create Account";
      pwd.autocomplete = _authMode === "login" ? "current-password" : "new-password";
      err.style.display = "none";
    };
  });

  form.onsubmit = async (e) => {
    e.preventDefault();
    err.style.display = "none";
    const email = $("#auth-email").value.trim();
    const password = pwd.value;
    if (!email || !password) { showErr(err, "Enter email and password"); return; }
    if (password.length < 6) { showErr(err, "Password must be at least 6 characters"); return; }
    submit.disabled = true; submit.textContent = "Loading...";
    try {
      if (_authMode === "login") await signInWithEmailAndPassword(auth, email, password);
      else await createUserWithEmailAndPassword(auth, email, password);
    } catch (ex) {
      showErr(err, prettyError(ex));
      submit.disabled = false;
      submit.textContent = _authMode === "login" ? "Sign In" : "Create Account";
    }
  };

  $("#google-btn").onclick = async () => {
    err.style.display = "none";
    try { await signInWithPopup(auth, googleProvider); }
    catch (ex) { showErr(err, prettyError(ex)); }
  };

  // Forgot password
  const forgotBtn = $("#forgot-btn");
  const ok = $("#auth-ok");
  if (forgotBtn) forgotBtn.onclick = async () => {
    err.style.display = "none";
    ok.style.display = "none";
    const email = $("#auth-email").value.trim();
    if (!email) { showErr(err, "Enter your email first, then tap Forgot password."); return; }
    forgotBtn.disabled = true;
    forgotBtn.textContent = "Sending...";
    try {
      await sendPasswordResetEmail(auth, email);
      ok.textContent = `Reset link sent to ${email}. Check your inbox.`;
      ok.style.display = "block";
    } catch (ex) {
      showErr(err, prettyError(ex));
    } finally {
      forgotBtn.disabled = false;
      forgotBtn.textContent = "Forgot password?";
    }
  };
}

function showErr(node, msg) { node.textContent = msg; node.style.display = "block"; }

      <circle cx="36" cy="36" r="${r}" stroke="#242836" stroke-width="6" fill="none"/>
      <circle cx="36" cy="36" r="${r}" stroke="url(#ring-grad)" stroke-width="6" fill="none" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 36 36)"
        style="transition: stroke-dashoffset 0.6s ease"/>
      <text x="36" y="41" text-anchor="middle" fill="#F5F7FA" font-size="14" font-weight="700" font-family="Inter">${Math.round(pct)}%</text>
    </svg>
  `;
}

  const nj = $$("[data-action='new-job']"); nj.forEach(b => b.onclick = () => { state.viewingJob = null; state.editingJob = null; _jobDraft = null; state.view = "job-form"; render(); });

/* ============================================================

   ============================================================ */
let _jobDraft = null;

function initJobDraft(existing) {
  const first = SERVICES.find(s => state.settings?.servicesConfig?.[s.id]?.enabled) || SERVICES[0];

    id: existing?.id || null,
    serviceId: existing?.serviceId || first.id,
    vehicleType: existing?.vehicleType || "car",
    location: existing?.location || "",
    miles: existing?.miles ?? 0,
    customAdjustment: existing?.customAdjustment ?? 0,
    overridePrice: existing?.overridePrice ?? "",
    materialCost: existing?.materialCost ?? 0,
    tireSize: existing?.tireSize || "",
    tireBrand: existing?.tireBrand || "",
    tireModel: existing?.tireModel || "",
    tireQty: existing?.tireQty ?? 1,
    customerName: existing?.customerName || "",
    customerPhone: existing?.customerPhone || "",
    source: existing?.source || "",
    notes: existing?.notes || "",
    status: existing?.status || "pending",

}

      <div class="form-body">

        <!-- Vehicle Type -->

                <span style="font-size:18px">${v.ico}</span><span>${esc(v.name)}</span>
              </button>
            `).join("")}
          </div>
          <div class="hint">Heavy-duty increases pricing by ${Math.round((VEHICLE_TYPES.find(v=>v.id===d.vehicleType).multiplier - 1) * 100)}%</div>
        </section>

        <!-- Location -->
        <section class="card">
          <h3 class="sec-title">Location</h3>
          ${renderCitySearchInput("location", d.location, "Search Connecticut town or city…")}
          <div class="row-2">
            <div class="field-inline">
              <label class="field-label">Miles from base</label>
              <input type="number" min="0" step="0.1" id="f-miles" value="${d.miles}"/>
            </div>
            <div class="field-inline">
              <label class="field-label">Free miles</label>
              <input type="number" value="${state.settings.freeMiles}" disabled/>
            </div>
          </div>
        </section>

        <section class="card tire-section" id="tire-section" style="${svc?.isTire ? '' : 'display:none;'}">
          <h3 class="sec-title">Tire Details</h3>
          <div class="row-2">
            <div class="field-inline">
              <label class="field-label">Size</label>
              <input type="text" id="f-tireSize" value="${esc(d.tireSize)}" placeholder="225/45R17"/>

            <div class="field-inline">
              <label class="field-label">Quantity</label>
              <input type="number" min="1" id="f-tireQty" value="${d.tireQty || 1}"/>
            </div>
          </div>
          <div class="row-2">
            <div class="field-inline">
              <label class="field-label">Brand</label>
              <input type="text" id="f-tireBrand" value="${esc(d.tireBrand)}" placeholder="Michelin"/>
            </div>
            <div class="field-inline">
              <label class="field-label">Model</label>
              <input type="text" id="f-tireModel" value="${esc(d.tireModel)}" placeholder="Defender"/>

        <!-- Pricing -->

          <h3 class="sec-title">Pricing</h3>

            <div class="price-line"><span>Travel (<span id="pb-miles">${pricing.billableMiles.toFixed(1)}</span> mi × ${fmt$(pricing.perMileRate)})</span><span id="pb-travel">${fmt$(pricing.travelCharge)}</span></div>
            <div class="price-line">
              <span>Custom adjustment</span>
              <input type="number" step="0.01" id="f-customAdj" value="${d.customAdjustment}" style="width:90px; text-align:right; padding:4px 8px; font-size:13px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text);"/>

            <div id="pb-min-warn" class="price-min-warn" style="${pricing.bumpedToMin ? '' : 'display:none;'}">⚠ Raised to minimum <span id="pb-min-val">${fmt$(pricing.minimumAllowed)}</span> (materials + <span id="pb-min-profit">${fmt$(pricing.minProfit)}</span> min profit)</div>

            <input type="text" id="f-custName" value="${esc(d.customerName)}" placeholder="John Smith"/>
          </div>
          <div class="field-inline">
            <label class="field-label">Phone</label>
            <input type="tel" id="f-custPhone" value="${esc(d.customerPhone)}" placeholder="(860) 555-1234"/>

}

function bindJobForm() {
  const cancel = () => {
    const wasEditingExisting = !!(_jobDraft && _jobDraft.id);
    _jobDraft = null;
    state.editingJob = null;
    // If we were editing an existing job, go back to its detail page; otherwise Jobs list
    if (wasEditingExisting && state.viewingJob) {
      state.view = "job-detail";
    } else {
      state.viewingJob = null;
      state.view = "jobs";
    }
    render();
  };
  $("#cancel-btn").onclick = cancel;
  $("#cancel-btn-2").onclick = cancel;

  // Service picker — update DOM locally, toggle tire section visibility, refresh pricing only
  $$("[data-svc]").forEach(b => b.onclick = () => {
    _jobDraft.serviceId = b.dataset.svc;
    $$("[data-svc]").forEach(x => x.classList.toggle("on", x === b));
    const svc = SERVICES.find(s => s.id === _jobDraft.serviceId);
    const tireSection = document.getElementById("tire-section");
    if (tireSection) tireSection.style.display = svc?.isTire ? "" : "none";
    refreshPricingPanel();
  });

  // Vehicle type
  $$("[data-vtype]").forEach(b => b.onclick = () => {
    _jobDraft.vehicleType = b.dataset.vtype;
    $$("[data-vtype]").forEach(x => x.classList.toggle("on", x === b));
    const hint = $(".vtype-grid")?.parentElement?.querySelector(".hint");
    if (hint) {
      const mult = VEHICLE_TYPES.find(v => v.id === _jobDraft.vehicleType).multiplier;
      hint.textContent = `Heavy-duty increases pricing by ${Math.round((mult - 1) * 100)}%`;
    }
    refreshPricingPanel();
  });

  // Status picker
  $$("[data-status]").forEach(b => b.onclick = () => {
    _jobDraft.status = b.dataset.status;
    $$("[data-status]").forEach(x => {
      const on = x === b;
      x.classList.toggle("on", on);
      const st = STATUSES.find(s => s.key === x.dataset.status);
      if (on && st) {
        const c = st.cls === 'pending' ? 'warn' : st.cls === 'progress' ? 'primary' : 'success';
        x.style.borderColor = `var(--${c})`;
        x.style.color = `var(--${c})`;
      } else {
        x.style.borderColor = "";
        x.style.color = "";
      }
    });
  });

  // Source chips
  $$("[data-source]").forEach(b => b.onclick = () => {
    const val = b.dataset.source;
    _jobDraft.source = (_jobDraft.source === val) ? "" : val;
    $$("[data-source]").forEach(x => x.classList.toggle("on", x.dataset.source === _jobDraft.source));
  });

  // Text inputs — no re-render on keystroke, just update state
  ["f-custName","f-custPhone","f-notes","f-tireSize","f-tireBrand","f-tireModel"].forEach(id => {
    const el = $("#" + id); if (!el) return;
    const map = { "f-custName": "customerName", "f-custPhone": "customerPhone", "f-notes": "notes",
                  "f-tireSize": "tireSize", "f-tireBrand": "tireBrand", "f-tireModel": "tireModel" };
    el.addEventListener("input", () => { _jobDraft[map[id]] = el.value; });
  });

  // Numeric inputs — update draft + refresh only pricing panel
  ["f-miles","f-customAdj","f-matCost","f-override","f-tireQty"].forEach(id => {
    const el = $("#" + id); if (!el) return;
    const map = { "f-miles":"miles", "f-customAdj":"customAdjustment", "f-matCost":"materialCost",
                  "f-override":"overridePrice", "f-tireQty":"tireQty" };
    el.addEventListener("input", () => {
      _jobDraft[map[id]] = el.value === "" ? (id === "f-override" ? "" : 0) : el.value;
      refreshPricingPanel();
    });
  });

  // Location search
  bindCitySearchInput("location", (v) => { _jobDraft.location = v; });

  $("#save-btn").onclick = async () => {
    const d = _jobDraft;
    const pricing = calcPricing(d);
    const hasOverride = d.overridePrice !== "" && d.overridePrice !== null && !isNaN(Number(d.overridePrice));
    const finalPrice = hasOverride ? Math.max(0, Number(d.overridePrice)) : pricing.suggestedPrice;
    const profit = Math.max(0, finalPrice - (Number(d.materialCost) || 0));

    const btn = $("#save-btn");
    btn.disabled = true; btn.textContent = "Saving...";
    try {
      await saveJob({
        id: d.id || undefined,
        serviceId: d.serviceId,
        vehicleType: d.vehicleType,
        location: d.location.trim(),
        miles: Number(d.miles) || 0,
        customAdjustment: Number(d.customAdjustment) || 0,
        overridePrice: hasOverride ? Number(d.overridePrice) : null,
        basePrice: pricing.basePrice,
        travelCharge: pricing.travelCharge,
        suggestedPrice: pricing.suggestedPrice,
        finalPrice,
        materialCost: Number(d.materialCost) || 0,
        profit,
        tireSize: d.tireSize.trim(),
        tireBrand: d.tireBrand.trim(),
        tireModel: d.tireModel.trim(),
        tireQty: Number(d.tireQty) || 1,
        customerName: d.customerName.trim(),
        customerPhone: d.customerPhone.trim(),
        source: d.source,
        notes: d.notes.trim(),
        status: d.status,
      });
      _jobDraft = null;
      state.editingJob = null;
      state.viewingJob = null;
      state.view = "jobs";
      render();
    } catch (e) {
      console.error(e);
      alert("Failed to save: " + prettyError(e));
      btn.disabled = false; btn.textContent = d.id ? "Update Job" : "Create Job";
    }
  };
}

// Targeted pricing refresh — updates only the pricing panel numbers, preserves input focus
function refreshPricingPanel() {
  if (!_jobDraft) return;
  const d = _jobDraft;
  const svc = SERVICES.find(s => s.id === d.serviceId);
  const p = calcPricing(d);
  const hasOverride = d.overridePrice !== "" && d.overridePrice !== null && !isNaN(Number(d.overridePrice));
  const finalPrice = hasOverride ? Math.max(0, Number(d.overridePrice)) : p.suggestedPrice;
  const profit = Math.max(0, finalPrice - (Number(d.materialCost) || 0));

  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set("pb-svc", svc?.name || "");
  set("pb-base", fmt$(p.basePrice));
  set("pb-miles", p.billableMiles.toFixed(1));
  set("pb-travel", fmt$(p.travelCharge));
  set("pb-raw", fmt$(p.rawPrice));
  set("pb-suggested", fmt$(p.suggestedPrice));
  set("pb-final", fmt$(finalPrice));
  set("pb-profit", fmt$(profit));
  set("pb-min-val", fmt$(p.minimumAllowed));
  set("pb-min-profit", fmt$(p.minProfit));

  const warn = document.getElementById("pb-min-warn");
  if (warn) warn.style.display = p.bumpedToMin ? "" : "none";

  // Update override placeholder so it reflects new suggested
  const overrideEl = document.getElementById("f-override");
  if (overrideEl) overrideEl.placeholder = `Leave blank to use ${fmt$(p.suggestedPrice)}`;
}

const _quote = {
  serviceId: null,
  vehicleType: "car",
  miles: 0,
  materialCost: 0,
};

function openQuickQuote() {
  // Default to first enabled service
  const enabled = SERVICES.filter(s => state.settings?.servicesConfig?.[s.id]?.enabled);
  if (!_quote.serviceId || !enabled.find(s => s.id === _quote.serviceId)) {
    _quote.serviceId = enabled[0]?.id || SERVICES[0].id;
  }

  // Mount a dedicated overlay on body (so it works from any view)
  let host = document.getElementById("quote-overlay");
  if (host) host.remove();
  host = document.createElement("div");
  host.id = "quote-overlay";
  document.body.appendChild(host);

  renderQuickQuote();
}

function renderQuickQuote() {
  const host = document.getElementById("quote-overlay");
  if (!host) return;

  const enabled = SERVICES.filter(s => state.settings?.servicesConfig?.[s.id]?.enabled);
  const p = calcPricing({
    serviceId: _quote.serviceId,
    vehicleType: _quote.vehicleType,
    miles: _quote.miles,
    materialCost: _quote.materialCost,
    customAdjustment: 0,
  });

  host.innerHTML = `
    <div class="modal-bg" id="qq-bg">
      <div class="modal" id="qq-inner">
        <div class="modal-head">
          <h3>⚡ Quick Quote</h3>
          <button class="icon-btn" id="qq-close">✕</button>
        </div>

        <section class="card" style="margin-bottom:10px;">
          <h3 class="sec-title">Service</h3>
          <div class="service-picker">
            ${enabled.map(s => `
              <button type="button" class="svc-chip ${_quote.serviceId === s.id ? "on" : ""}" data-qq-svc="${s.id}">
                <span>${s.ico}</span><span>${esc(s.name)}</span>
              </button>
            `).join("")}
          </div>
        </section>

        <section class="card" style="margin-bottom:10px;">
          <h3 class="sec-title">Vehicle</h3>
          <div class="vtype-grid">
            ${VEHICLE_TYPES.map(v => `
              <button type="button" class="vtype-btn ${_quote.vehicleType === v.id ? "on" : ""}" data-qq-vtype="${v.id}">
                <span style="font-size:18px">${v.ico}</span><span>${esc(v.name)}</span>
              </button>
            `).join("")}
          </div>
        </section>

        <section class="card" style="margin-bottom:10px;">
          <h3 class="sec-title">Distance & Materials</h3>
          <div class="row-2">
            <div>
              <label class="field-label">Miles from base</label>
              <input type="number" min="0" step="0.1" id="qq-miles" value="${_quote.miles}"/>
            </div>
            <div>
              <label class="field-label">Material cost</label>
              <input type="number" min="0" step="0.01" id="qq-material" value="${_quote.materialCost}"/>
            </div>
          </div>
        </section>

        <div class="quote-result">
          <div class="quote-result-label">Suggested Price</div>
          <div class="quote-result-amount">${fmt$(p.suggestedPrice)}</div>
          <div class="quote-result-breakdown">
            Base ${fmt$(p.basePrice)} + Travel ${fmt$(p.travelCharge)}
            ${p.bumpedToMin ? ` · min profit applied` : ""}
          </div>
        </div>

        <button class="btn-primary full" id="qq-to-job" style="margin-top:12px;">Create Job with This Quote →</button>
      </div>
    </div>
  `;

  const close = () => { host.remove(); };
  document.getElementById("qq-bg").onclick = (e) => { if (e.target.id === "qq-bg") close(); };
  document.getElementById("qq-close").onclick = close;

  // Shared helper — refreshes just the result box
  const updateResult = () => {
    const p2 = calcPricing({
      serviceId: _quote.serviceId, vehicleType: _quote.vehicleType,
      miles: _quote.miles, materialCost: _quote.materialCost, customAdjustment: 0,
    });
    const resWrap = host.querySelector(".quote-result");
    if (!resWrap) return;
    resWrap.querySelector(".quote-result-amount").textContent = fmt$(p2.suggestedPrice);
    resWrap.querySelector(".quote-result-breakdown").textContent =
      `Base ${fmt$(p2.basePrice)} + Travel ${fmt$(p2.travelCharge)}${p2.bumpedToMin ? ' · min profit applied' : ''}`;
  };

  // Service picker — toggle "on" class locally, no re-render
  host.querySelectorAll("[data-qq-svc]").forEach(b => {
    b.onclick = () => {
      _quote.serviceId = b.dataset.qqSvc;
      host.querySelectorAll("[data-qq-svc]").forEach(x => x.classList.toggle("on", x === b));
      updateResult();
    };
  });
  // Vehicle picker
  host.querySelectorAll("[data-qq-vtype]").forEach(b => {
    b.onclick = () => {
      _quote.vehicleType = b.dataset.qqVtype;
      host.querySelectorAll("[data-qq-vtype]").forEach(x => x.classList.toggle("on", x === b));
      updateResult();
    };
  });
  // Number inputs
  const milesEl = document.getElementById("qq-miles");
  const matEl = document.getElementById("qq-material");
  milesEl.addEventListener("input", () => {
    _quote.miles = Number(milesEl.value) || 0;
    updateResult();
  });
  matEl.addEventListener("input", () => {
    _quote.materialCost = Number(matEl.value) || 0;
    updateResult();
  });

  // Convert quote → full job
  document.getElementById("qq-to-job").onclick = () => {
    close();
    state.viewingJob = null;
    state.editingJob = {
      serviceId: _quote.serviceId,
      vehicleType: _quote.vehicleType,
      miles: _quote.miles,
      materialCost: _quote.materialCost,
    };
    _jobDraft = null;
    state.view = "job-form";
    render();
  };
}

        <section class="card">
          <div class="field-inline">
            <label class="field-label">Name</label>
            <input type="text" id="exp-name" value="${esc(_expDraft.name)}" placeholder="Gas for service truck"/>
          </div>
          <div class="row-2">
            <div class="field-inline">
              <label class="field-label">Amount</label>
              <input type="number" min="0" step="0.01" id="exp-amount" value="${_expDraft.amount}" placeholder="0.00"/>
            </div>
            <div class="field-inline">
              <label class="field-label">Date</label>
              <input type="date" id="exp-date" value="${_expDraft.date}"/>
            </div>
          </div>
          <div class="field-inline">
            <label class="field-label">Category</label>
            <div class="chip-list">
              ${EXPENSE_CATEGORIES.map(c => `<button type="button" class="chip ${_expDraft.category === c ? "on" : ""}" data-cat="${esc(c)}">${esc(c)}</button>`).join("")}
            </div>
          </div>
          <div class="field-inline">
            <label class="field-label">Notes</label>
            <textarea rows="2" id="exp-notes" placeholder="Optional">${esc(_expDraft.notes)}</textarea>
          </div>
        </section>
        <div class="form-actions">
          ${isEdit ? '<button class="btn-ghost danger" id="exp-delete">🗑 Delete</button>' : ''}
          <button class="btn-primary" id="exp-save">${isEdit ? "Update" : "Add Expense"}</button>
        </div>
      </div>
    </div>
  `;
}

function bindExpenseForm() {
  $("#exp-cancel").onclick = () => { _expDraft = null; state.editingExp = null; state.view = "expenses"; render(); };
  $$("[data-cat]").forEach(b => b.onclick = () => { _expDraft.category = b.dataset.cat; render(); });

  const bind = (id, key) => {
    const el = $("#" + id); if (!el) return;
    el.addEventListener("input", () => { _expDraft[key] = el.value; });
  };
  bind("exp-name","name"); bind("exp-amount","amount"); bind("exp-date","date"); bind("exp-notes","notes");

  $("#exp-save").onclick = async () => {
    const btn = $("#exp-save"); btn.disabled = true; btn.textContent = "Saving...";
    try {
      await saveExpense({
        id: _expDraft._id || undefined,
        name: _expDraft.name.trim(),
        category: _expDraft.category,
        amount: Number(_expDraft.amount) || 0,
        date: new Date(_expDraft.date).getTime(),
        notes: _expDraft.notes.trim(),
      });
      _expDraft = null;
      state.editingExp = null;
      state.view = "expenses";
      render();
    } catch (e) {
      console.error(e);
      alert("Failed: " + prettyError(e));
      btn.disabled = false; btn.textContent = _expDraft._id ? "Update" : "Add Expense";
    }
  };

  const del = $("#exp-delete");
  if (del) del.onclick = () => {
    const id = _expDraft._id;
    showConfirmModal("Delete this expense?", "This can't be undone.", "Delete", true, async () => {
      await deleteExpense(id);
      _expDraft = null;
      state.editingExp = null;
      state.view = "expenses";
      render();
    });
  };
}

          <div class="logo-compact"><img src="${LOGO_SRC}" alt=""/></div>
          <div>
            <div class="greet">Settings</div>
            <h1 class="biz">Business Config</h1>
          </div>
        </div>
      </header>

      <section class="card">
        <h3 class="sec-title">Account</h3>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-val">${esc(state.user.email || "—")}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Business</span>
          <span class="info-val">${esc(APP_BIZ_NAME)}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Base</span>
          <span class="info-val">${esc(APP_BIZ_CITY)}</span>
        </div>
      </section>

      <section class="card">
        <h3 class="sec-title">Contact (on Invoices)</h3>
        <div class="field-inline">
          <label class="field-label">Phone</label>
          <input type="tel" id="s-phone" value="${esc(s.phone)}" placeholder="(860) 555-1234"/>
        </div>
      </section>

      <section class="card">
        <h3 class="sec-title">Travel</h3>
        <div class="row-2">
          <div class="field-inline">
            <label class="field-label">Per-Mile Rate</label>
            <input type="number" step="0.05" id="s-perMile" value="${s.perMileRate}"/>
          </div>
          <div class="field-inline">
            <label class="field-label">Free Miles</label>
            <input type="number" id="s-freeMiles" value="${s.freeMiles}"/>
          </div>
        </div>
        <div class="hint">Distance charge kicks in after free miles. Applied to every job.</div>
      </section>

      <section class="card">
        <h3 class="sec-title">Services — Enable & Price</h3>
        <div id="svc-settings">
          ${SERVICES.map(svc => {
            const cfg = s.servicesConfig[svc.id] || { enabled: true, base: svc.base, minProfit: svc.minProfit };
            return `
              <div class="svc-settings" data-svc-id="${svc.id}">
                <div class="svc-settings-head">
                  <div class="svc-settings-name">
                    <span class="svc-settings-ico">${svc.ico}</span>
                    <span>${esc(svc.name)}</span>
                  </div>
                  <button type="button" class="toggle ${cfg.enabled ? 'on' : ''}" data-svc-toggle="${svc.id}">
                    <span class="toggle-knob"></span>
                  </button>
                </div>
                <div class="svc-settings-inputs">
                  <div>
                    <label class="field-label">Base Price</label>
                    <input type="number" min="0" step="1" class="svc-base" data-svc="${svc.id}" value="${cfg.base}" ${!cfg.enabled ? 'disabled' : ''}/>
                  </div>
                  <div>
                    <label class="field-label">Min Profit</label>
                    <input type="number" min="0" step="1" class="svc-minprofit" data-svc="${svc.id}" value="${cfg.minProfit}" ${!cfg.enabled ? 'disabled' : ''}/>
                  </div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
        <button class="btn-primary full" id="s-save" style="margin-top:8px;">Save Settings</button>
        <div id="s-msg" style="margin-top:10px; display:none;"></div>
      </section>

      <button class="logout-btn" id="s-logout">↪ Sign Out</button>
      <div class="version">K31 v1.0 · Connecticut</div>
    </div>
  `;
}

function bindSettings() {
  // toggles (visual only until Save)
  const localSettings = JSON.parse(JSON.stringify(state.settings));

  $$("[data-svc-toggle]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.svcToggle;
      const cfg = localSettings.servicesConfig[id] || { enabled: true, base: 0, minProfit: 0 };
      cfg.enabled = !cfg.enabled;
      localSettings.servicesConfig[id] = cfg;
      btn.classList.toggle("on", cfg.enabled);
      // enable/disable inputs
      const card = btn.closest(".svc-settings");
      card.querySelectorAll("input").forEach(inp => inp.disabled = !cfg.enabled);
    };
  });

  $("#s-save").onclick = async () => {
    const msg = $("#s-msg");
    msg.style.display = "none";
    const perMileRate = Number($("#s-perMile").value) || 0;
    const freeMiles = Number($("#s-freeMiles").value) || 0;
    const phone = $("#s-phone").value.trim();

    $$(".svc-base").forEach(i => {
      const id = i.dataset.svc;
      if (!localSettings.servicesConfig[id]) localSettings.servicesConfig[id] = { enabled: true, base: 0, minProfit: 0 };
      localSettings.servicesConfig[id].base = Number(i.value) || 0;
    });
    $$(".svc-minprofit").forEach(i => {
      const id = i.dataset.svc;
      if (!localSettings.servicesConfig[id]) localSettings.servicesConfig[id] = { enabled: true, base: 0, minProfit: 0 };
      localSettings.servicesConfig[id].minProfit = Number(i.value) || 0;
    });

    const btn = $("#s-save"); btn.disabled = true; btn.textContent = "Saving...";
    try {
      await saveSettings({
        perMileRate, freeMiles, phone,
        servicesConfig: localSettings.servicesConfig,
      });
      msg.className = "ok-msg";
      msg.textContent = "✓ Settings saved";
      msg.style.display = "block";
    } catch (e) {
      console.error(e);
      msg.className = "err-msg";
      msg.textContent = "Failed: " + prettyError(e);
      msg.style.display = "block";
    } finally {
      btn.disabled = false; btn.textContent = "Save Settings";
      setTimeout(() => { msg.style.display = "none"; }, 3500);
    }
  };

  $("#s-logout").onclick = () => {
    showConfirmModal("Sign out?", "You'll need to log back in to access your data.", "Sign Out", false, async () => {
      try { await signOut(auth); } catch (e) { console.error(e); }
    });
  };
}

/* ============================================================
   CITY SEARCH INPUT
   ============================================================ */
function renderCitySearchInput(fieldKey, value, placeholder) {
  return `
    <div class="search-wrap" data-search="${fieldKey}">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input-${fieldKey}" value="${esc(value)}" placeholder="${esc(placeholder || "Search…")}" autocomplete="off"/>
      </div>
      <div class="search-pop" id="search-pop-${fieldKey}" style="display:none;"></div>
    </div>
  `;
}

function bindCitySearchInput(fieldKey, onChange) {
  const input = $("#search-input-" + fieldKey);
  const pop = $("#search-pop-" + fieldKey);
  if (!input || !pop) return;

  const savedNames = [...state.savedLocations]
    .sort((a, b) => (b.count - a.count) || (b.lastUsed - a.lastUsed))
    .map(s => s.name);
  const combined = [...new Set([...savedNames, ...CT_CITIES])];

  const getSuggestions = (q) => {
    q = q.toLowerCase().trim();
    if (!q) return combined.slice(0, 8);
    return combined.filter(c => c.toLowerCase().includes(q)).slice(0, 8);
  };

  const renderSug = () => {
    const items = getSuggestions(input.value);
    if (items.length === 0) { pop.style.display = "none"; return; }
    pop.innerHTML = items.map(c => {
      const saved = state.savedLocations.find(s => s.name === c);
      return `<button type="button" class="search-item" data-city="${esc(c)}">📍 <span>${esc(c)}</span>${saved ? `<span class="saved-count">${saved.count}×</span>` : ""}</button>`;
    }).join("");
    pop.style.display = "block";
    $$(".search-item", pop).forEach(b => {
      b.onmousedown = (e) => e.preventDefault();
      b.onclick = () => {
        input.value = b.dataset.city;
        onChange(b.dataset.city);
        pop.style.display = "none";
      };
    });
  };

  input.addEventListener("focus", renderSug);
  input.addEventListener("input", () => {
    onChange(input.value);
    renderSug();
  });
  input.addEventListener("blur", () => {
    setTimeout(() => { pop.style.display = "none"; }, 180);
  });
}

function bindCurrentView() {
  switch (state.view) {
    case "dashboard":   bindDashboard(); bindBottomNav(); break;
    case "jobs":        bindJobsList(); bindBottomNav(); break;
    case "inventory":   bindInventoryList(); bindBottomNav(); break;
    case "expenses":    bindExpensesList(); bindBottomNav(); break;

    case "job-form":    bindJobForm(); break;
